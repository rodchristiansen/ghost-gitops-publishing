name: release

on:
  push:
    branches: ["main"]   # auto-release on every merge to main

permissions:
  contents: write  # needed for creating tags and uploading release assets

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gen.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate date-based version tag
        id: gen
        run: |
          VERSION=$(date -u +"%Y.%m.%d.%H%M")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

  build:
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # --------- linux ----------
          - goos: linux     # x86_64
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux     # arm64
            goarch: arm64
            ext: ""
            archive: tar.gz
          # --------- macOS ----------
          - goos: darwin
            goarch: amd64   # intel
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64   # apple silicon
            ext: ""
            archive: tar.gz
          # --------- windows --------
          - goos: windows
            goarch: amd64   # x86_64
            ext: .exe
            archive: zip
          - goos: windows   # arm64
            goarch: arm64
            ext: .exe
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          out="ghostpost${{ matrix.ext }}"
          dir="ghostpost-${GOOS}-${GOARCH}"
          mkdir -p "$dir"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "$dir/$out" ./cmd/ghostpost
          # compress
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "${dir}.zip" "$dir"
          else
            tar -czf "${dir}.tar.gz" "$dir"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostpost-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ghostpost-${{ matrix.goos }}-${{ matrix.goarch }}*.${{ matrix.archive }}

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          name: ${{ needs.tag.outputs.version }}
          draft: false           # publish immediately
          prerelease: false
          files: |
            dist/**/*
